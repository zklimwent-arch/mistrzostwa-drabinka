<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drabinka - Direct Engine</title>
    <style>
        :root {
            /* Prawdziwa czerń (OLED Black) i mocny akcent */
            --bg-color: #000000;
            --card-bg: #121212;
            --text-color: #ffffff;
            --accent-color: #00ff88;
            --border-color: #2a2a2a;
            --tbd-color: #555555;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
        }

        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-bar {
            text-align: center;
            font-size: 11px;
            color: var(--accent-color);
            margin-bottom: 20px;
            font-family: monospace;
        }

        .bracket-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 20px;
        }

        .round {
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-width: 280px;
            scroll-snap-align: center;
        }

        .round-title {
            text-align: center;
            font-size: 14px;
            color: #888;
            margin-bottom: 8px;
        }

        .match {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 15px;
        }

        .team {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 15px;
        }

        .team:first-child {
            border-bottom: 1px solid var(--border-color);
        }

        .score {
            font-weight: 700;
            font-size: 16px;
        }

        .tbd { color: var(--tbd-color); }
        .winner { color: var(--text-color); font-weight: bold; }
        .winner .score { color: var(--accent-color); }

        /* Animacja tylko dla zmieniających się wyników */
        @keyframes flashUpdate {
            0% { background-color: rgba(0, 255, 136, 0.3); }
            100% { background-color: transparent; }
        }
        .updated { animation: flashUpdate 1s ease-out; }
    </style>
</head>
<body>

    <h1>Drabinka Turniejowa</h1>
    <div class="status-bar" id="status">● DIRECT CONNECTION: AKTYWNE</div>
    
    <div class="bracket-container" id="bracket">
        </div>

    <script>
        // ==========================================
        // SILNIK DIRECT FETCH (Błyskawiczny, bez proxy)
        // ==========================================
        
        // TUTAJ wklejasz bezpośredni, surowy link do pliku JSON w internecie
        // Np. raw link z GitHuba, który serwuje dane w milisekundy.
        const DIRECT_DATA_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

        // Zmienna do śledzenia poprzednich danych (żeby animować tylko zmiany)
        let poprzednieDane = null;

        async function pobierzDaneBezposrednio() {
            try {
                // Bezpośrednie uderzenie do źródła + timestamp, żeby ominąć pamięć podręczną (cache) telefonu
                const odpowiedz = await fetch(`${DIRECT_DATA_URL}?t=${Date.now()}`);
                
                if (!odpowiedz.ok) throw new Error('Błąd połączenia');
                
                const aktualneDane = await odpowiedz.json();
                
                // Jeśli dane są inne niż poprzednio, przebuduj drabinkę
                if (JSON.stringify(aktualneDane) !== JSON.stringify(poprzednieDane)) {
                    zbudujDrabinke(aktualneDane);
                    poprzednieDane = aktualneDane;
                    document.getElementById('status').innerText = `● OSTATNIA AKTUALIZACJA: ${new Date().toLocaleTimeString()}`;
                }

            } catch (error) {
                console.warn("Brak połączenia, ponawiam próbę...");
                // Gdy braknie neta, silnik po prostu czeka i nie psuje interfejsu
            }
        }

        // ==========================================
        // RYSOWANIE INTERFEJSU
        // ==========================================
        function renderujDruzyne(nazwa, wynik, isWinner) {
            const czyTBD = !nazwa || nazwa.includes("TBD");
            const klasaDruzyny = czyTBD ? "tbd" : (isWinner ? "winner" : "");
            const wyswietlanaNazwa = czyTBD ? "Nieustalony" : nazwa;
            const wyswietlanyWynik = (wynik !== null && wynik !== undefined) ? wynik : "-";
            
            return `
                <div class="team ${klasaDruzyny}">
                    <span>${wyswietlanaNazwa}</span>
                    <span class="score">${wyswietlanyWynik}</span>
                </div>
            `;
        }

        function zbudujDrabinke(dane) {
            const kontener = document.getElementById('bracket');
            let html = '';

            // Przykładowe przetwarzanie 1/16 Finału z surowego JSON-a
            if(dane.roundOf16) {
                html += '<div class="round"><div class="round-title">1/16 FINAŁU</div>';
                dane.roundOf16.forEach(mecz => {
                    let w1 = mecz.score1 > mecz.score2 && mecz.finished;
                    let w2 = mecz.score2 > mecz.score1 && mecz.finished;
                    
                    html += `<div class="match updated">
                        ${renderujDruzyne(mecz.team1, mecz.score1, w1)}
                        ${renderujDruzyne(mecz.team2, mecz.score2, w2)}
                    </div>`;
                });
                html += '</div>';
            }

            // Ćwierćfinały
            if(dane.quarterFinals) {
                html += '<div class="round"><div class="round-title">ĆWIERĆFINAŁY</div>';
                dane.quarterFinals.forEach(mecz => {
                    let w1 = mecz.score1 > mecz.score2 && mecz.finished;
                    let w2 = mecz.score2 > mecz.score1 && mecz.finished;

                    html += `<div class="match updated">
                        ${renderujDruzyne(mecz.team1, mecz.score1, w1)}
                        ${renderujDruzyne(mecz.team2, mecz.score2, w2)}
                    </div>`;
                });
                html += '</div>';
            }

            kontener.innerHTML = html;
        }

        // ==========================================
        // ODPALENIE I PĘTLA CZASU RZECZYWISTEGO
        // ==========================================
        
        // Szybki start
        pobierzDaneBezposrednio();
        
        // Pętla odpytująca bezpośrednio źródło co 15 sekund
        setInterval(pobierzDaneBezposrednio, 15000); 

    </script>
</body>
</html>
